services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-skillcompass}
      POSTGRES_USER: ${DB_USER:-datapulse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-datapulse_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datapulse} -d ${DB_NAME:-skillcompass}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestor:
    build: ./services/ingestor
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-datapulse}:${DB_PASSWORD:-datapulse_secret}@db:5432/${DB_NAME:-skillcompass}
      INGEST_SCHEDULE_HOURS: ${INGEST_SCHEDULE_HOURS:-4}

  api:
    build: ./services/api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml/artifacts:/app/project/ml/artifacts:ro
    env_file:
      - .env
    environment:
      APP_ROOT: /app/project
      DATABASE_URL: postgresql://${DB_USER:-datapulse}:${DB_PASSWORD:-datapulse_secret}@db:5432/${DB_NAME:-skillcompass}
      USE_DB: "true"

  dashboard:
    build: ./services/dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_URL: http://api:8000

volumes:
  postgres_data:
